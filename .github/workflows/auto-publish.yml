name: AI Inventory Auto-Publish

on:
  schedule:
    - cron: '0 */6 * * *'
  workflow_dispatch:
    inputs:
      mock_mode:
        description: 'Use mock data (no GPT-4 API call)'
        required: false
        type: boolean
        default: true

jobs:
  auto-publish:
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Install dependencies
        run: npm install openai

      - name: Check for new supplier input
        id: check-inbox
        run: |
          if [ -d inbox ] && [ "$(ls -A inbox/*.txt inbox/*.md 2>/dev/null)" ]; then
            echo "has_new=1" >> $GITHUB_OUTPUT
            echo "New supplier files found:"
            ls -la inbox/*.txt inbox/*.md 2>/dev/null
          else
            echo "has_new=0" >> $GITHUB_OUTPUT
            echo "No new supplier files in inbox/"
          fi

      - name: Run AI Pipeline
        if: steps.check-inbox.outputs.has_new == '1' || github.event.inputs.mock_mode == 'true'
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          GIT_AUTO_PUSH: '1'
        run: |
          if [ "${{ github.event.inputs.mock_mode }}" == "true" ]; then
            echo "Running in mock mode..."
            node build/ai-pipeline.js --mock
          else
            for file in inbox/*.txt inbox/*.md; do
              if [ -f "$file" ]; then
                echo "Processing: $file"
                node build/ai-pipeline.js "$file"
                mkdir -p inbox/processed
                mv "$file" "inbox/processed/$(date +%Y%m%d_%H%M%S)_$(basename $file)"
              fi
            done
          fi

      - name: Commit changes
        if: steps.check-inbox.outputs.has_new == '1' || github.event.inputs.mock_mode == 'true'
        run: |
          git config user.name "CheapALot AI Bot"
          git config user.email "ai-bot@cheapalot.com"
          git add -A
          git diff --staged --quiet || git commit -m "auto: AI pipeline processed supplier inventory"
          git push
